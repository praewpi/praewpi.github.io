<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ginger - Extracurricular</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <main>
        <!-- <h1>Extracurricular Activities</h1> -->
        <p class="subtitle"> activities.</p>
   
    </main>

    <div id="site-footer"></div>

    <script>
    async function includeHTML(id, url){
        try{
            const res = await fetch(url);
            if(!res.ok) return;
            document.getElementById(id).innerHTML = await res.text();
        }catch(e){/* fail silently */}
    }




    async function init(){
        await includeHTML('site-header','header.html');
        await includeHTML('site-footer','footer.html');
        // load shared header behaviors so connect dropdown works
        const h = document.createElement('script');
        h.src = 'js/header.js';
        document.body.appendChild(h);
    }
    init();
    </script>
</body>

</html>
